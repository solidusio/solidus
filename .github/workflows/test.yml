name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  solidus_admin:
    uses: solidusio/solidus/.github/workflows/test_solidus.yml@run-tests-on-github-actions
    with:
      lib_name: admin
      coverage: false

  solidus_api:
    uses: solidusio/solidus/.github/workflows/test_solidus.yml@run-tests-on-github-actions
    with:
      lib_name: api
      coverage: false

  solidus_backend:
    uses: solidusio/solidus/.github/workflows/test_solidus.yml@run-tests-on-github-actions
    with:
      lib_name: backend
      coverage: false

  solidus_backend_js:
    name: solidus_backend JS
    runs-on: ubuntu-latest
    env:
      LIB_NAME: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true
      - name: Run teaspoon tests
        run: |
          cd backend
          bundle exec teaspoon --require=spec/teaspoon_env.rb

  solidus_core:
    uses: solidusio/solidus/.github/workflows/test_solidus.yml@run-tests-on-github-actions
    with:
      lib_name: core
      coverage: false

  solidus_sample:
    uses: solidusio/solidus/.github/workflows/test_solidus.yml@run-tests-on-github-actions
    with:
      lib_name: sample
      coverage: false

  solidus_legacy_promotions:
    uses: solidusio/solidus/.github/workflows/test_solidus.yml@run-tests-on-github-actions
    with:
      lib_name: legacy_promotions
      coverage: false

  solidus_promotions:
    uses: solidusio/solidus/.github/workflows/test_solidus.yml@run-tests-on-github-actions
    with:
      lib_name: promotions
      coverage: false
