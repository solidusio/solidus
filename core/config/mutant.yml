---
# Run from core/:
#   bundle exec mutant environment show
#   bundle exec mutant environment subject list Spree*
usage: opensource
includes:
  - spec
requires:
  - rails_helper
environment_variables:
  RAILS_ENV: test
  DB: postgresql
  DB_HOST: 127.0.0.1
  DB_USERNAME: postgres
  DB_PASSWORD: password
integration:
  name: rspec
hooks:
  - spec/mutant_hooks.rb
matcher:
  subjects:
    - Spree*
